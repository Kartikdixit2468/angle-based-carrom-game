<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Angle Striker - Math Carrom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">
      <!-- Educational Prompts from the "Teacher" -->
      <div id="prompt" class="teacher-prompt">
        Drag striker sideways to position!
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-badge text-orange-500 border-2 border-orange-200">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"
            />
          </svg>
          Coins: <span id="score-display">0</span>/5
        </div>
        <div class="stat-badge text-blue-500 border-2 border-blue-200">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
              clip-rule="evenodd"
            />
          </svg>
          Time: <span id="time-display">60</span>s
        </div>
      </div>

      <canvas id="gameCanvas"></canvas>

      <!-- Start / End Screens -->
      <div id="menu" class="ui-panel">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">Math Carrom</h1>
        <p class="text-gray-300 mb-6 font-semibold">
          Master the angles to pocket the coins!
        </p>
        <div
          class="text-left text-sm text-gray-300 mb-6 space-y-2 bg-gray-800 p-3 rounded-lg border border-gray-600"
        >
          <p>âœ‹ <b>Drag</b> left/right to position your striker.</p>
          <p>ðŸŽ¯ <b>Pull backwards</b> to aim & set power.</p>
          <p>
            ðŸ“ Watch how the ball <b>bounces</b> at the same angle it hits!
          </p>
        </div>
        <button
          id="start-btn"
          class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-lg border-2 border-blue-400"
        >
          Play Game
        </button>
      </div>

      <div id="game-over" class="ui-panel hidden">
        <h1 id="end-title" class="text-3xl font-bold mb-2">Game Over!</h1>
        <p id="end-msg" class="text-gray-300 mb-6 text-lg"></p>
        <button
          id="restart-btn"
          class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-lg border-2 border-blue-400"
        >
          Try Again
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
